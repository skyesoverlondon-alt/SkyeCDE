<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password — Skye Mail Vault</title>
  <link rel="stylesheet" href="/assets/css/reset.css"/>
  <script src="/assets/app.js" defer></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="nav">
      <div class="brand">
        <img src="https://cdn1.sharemyimage.com/2026/02/16/logo1_transparent.png" alt="Skyes Over London LC Logo" />
        <div>
          <div class="t">Skye Mail Vault</div>
          <div class="s">Enterprise Secure Inbox</div>
        </div>
      </div>
      <div class="links"><a href="/">Home</a>
        <a href="/trust/">Trust Pack</a>
        <a href="/login.html">Login</a>
        <a href="/signup.html">Create Vault</a>
      </div>
    </div>
  </div>
  <div class="container">

<div class="card">
  <h1 class="h1 u1">Reset Password</h1>
  <p class="sub">Set a new password for your Vault account.</p>

  <label>New Password</label>
  <input id="pw1" type="password" placeholder="10+ characters" autocomplete="new-password" />

  <label>Confirm New Password</label>
  <input id="pw2" type="password" placeholder="Repeat password" autocomplete="new-password" />

  <div class="btnrow u2">
    <button class="btn gold" id="btnReset">Update password</button>
    <a class="btn" href="/login.html">Back to login</a>
  </div>

  <div class="hr"></div>
  <div id="status" class="mono">Ready.</div>
</div>

  </div>
</div>
<script src="/assets/pages/reset.js" defer></script>
</body>
</html>
