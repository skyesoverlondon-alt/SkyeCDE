name = "kaixu-brain-openai"
main = "src/index.js"
compatibility_date = "2026-03-02"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[triggers]
crons = ["*/3 * * * *"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[vars]
KAIXU_BRAIN_NAME = "kAIxU0s"
KAIXU_DEFAULT_MODEL = "kAIxU6.7-flash"
KAIXU_OPENAI_BASE_URL = "https://api.openai.com/v1"
KAIXU_OPEN_GATE = "0"
KAIXU_MAX_BODY_BYTES = "5242880"
KAIXU_TIMEOUT_MS = "25000"
KAIXU_ALLOWED_ORIGINS = ""
KAIXU_GLOBAL_SYSTEM = ""
# Central token authority (admin platform)
KAIXU_NETLIFY_URL = ""
KAIXU_NETLIFY_URLS = ""
KAIXU_TOKEN_VERIFY_URL = ""
KAIXU_VERIFY_TIMEOUT_MS = "3500"
KAIXU_TOKEN_VERIFY_DISABLE_DEFAULT = "0"
KAIXU_EMBED_MODEL = "text-embedding-3-small"
KAIXU_BRAIN_DEFAULT_TARGET = "omega"
KAIXU_BRAIN_BASE_KAIXU67 = "https://0megaskyegate.skyesoverlondon.workers.dev"
KAIXU_BRAIN_BASE_KAIXU0S = ""
KAIXU_BRAIN_BASE_FLOW32 = ""
KAIXU_SMOKE_AUTORUN = "1"
KAIXU_SMOKE_AUTORUN_GENERATE = "1"
KAIXU_SMOKE_PROMPT = "Reply with SMOKE_OK"
KAIXU_SMOKE_MAX_TOKENS = "16"

# SkyeErrors (error reporting)
SKYE_ERRORS_ENABLED = "1"
SKYE_ERRORS_RETENTION_DAYS = "30"
SKYE_ERRORS_MAX_BODY_BYTES = "1048576"
# Admin secret must be set as a Wrangler secret:
#   wrangler secret put SKYE_ERRORS_ADMIN_SECRET

# Secret required when KAIXU_NETLIFY_URL is set:
# wrangler secret put KAIXU_SERVICE_SECRET

[[kv_namespaces]]
binding = "KAIXU_SMOKE_KV"
id = "23fb56af05d94cd58b0aea70153d00b3"
preview_id = "f188f76d7cd145ed851ae8b87e8b2e60"


# SkyeErrors storage
[[d1_databases]]
binding = "SKYE_ERRORS_DB"
database_name = "skye_errors_db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "SKYE_ERRORS_RAW"
bucket_name = "skye-errors-raw"
