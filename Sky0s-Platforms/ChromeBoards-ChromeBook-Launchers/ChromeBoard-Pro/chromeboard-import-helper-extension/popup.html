<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ChromeBoard Helper</title><style>body{font-family:Inter,system-ui,sans-serif;background:#10081d;color:#fff;margin:0;padding:16px;min-width:320px}button,input{font:inherit}button{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:linear-gradient(135deg,rgba(158,92,255,.85),rgba(232,189,88,.35));color:#fff;font-weight:700;cursor:pointer}.muted{color:#d6c8ea;font-size:.9rem;margin:.75rem 0 0}.field{display:grid;gap:8px;margin-top:12px}input{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff}</style></head><body><h3 style="margin:0 0 8px">ChromeBoard Import Helper</h3><button id="importCurrentBtn">Import current tab</button><div class="field"><label for="urlInput">ChromeBoard URL</label><input id="urlInput" placeholder="https://your-chromeboard-site.example"/></div><button id="saveBtn" style="margin-top:12px;background:rgba(255,255,255,.09)">Save URL</button><p class="muted">Right-click pages or links in Chrome after you set the URL.</p><script src="popup.js"></script></body></html>
