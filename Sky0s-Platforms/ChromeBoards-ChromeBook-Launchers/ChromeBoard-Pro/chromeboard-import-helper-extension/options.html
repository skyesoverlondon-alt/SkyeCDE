<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ChromeBoard Helper Options</title><style>body{font-family:Inter,system-ui,sans-serif;background:#0d0718;color:#fff;max-width:860px;margin:0 auto;padding:32px 20px}input,button{font:inherit}input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff}button{margin-top:16px;padding:12px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:linear-gradient(135deg,rgba(158,92,255,.88),rgba(232,189,88,.35));color:#fff;font-weight:700;cursor:pointer}.muted{color:#d7cae9;max-width:72ch}</style></head><body><h1>ChromeBoard Import Helper</h1><p class="muted">Paste the deployed URL for your ChromeBoard app. The helper extension will use this address whenever you right-click a page or link and send it into ChromeBoard.</p><input id="urlInput" placeholder="https://your-chromeboard-site.example"/><br/><button id="saveBtn">Save ChromeBoard URL</button><p id="status" class="muted"></p><script src="options.js"></script></body></html>
