<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sovereign Variables Background</title>
  <style>
    html,body{margin:0; height:100%; overflow:hidden; background:#05030b}
    body{position:relative; font-family:system-ui, sans-serif; pointer-events:none}
    canvas{display:block; width:100vw; height:100vh}
    .logo-glow{
      position:absolute; inset:auto auto 50% 50%; transform:translate(-50%,50%);
      width:min(28vw,300px); opacity:.18; filter:blur(0px) drop-shadow(0 0 24px rgba(255,211,106,.18)) drop-shadow(0 0 42px rgba(141,88,255,.22));
      animation:float 8s ease-in-out infinite;
      mix-blend-mode:screen;
    }
    .veil{position:absolute; inset:0; background:
      radial-gradient(circle at 50% 50%, transparent 0 26%, rgba(5,3,11,.16) 44%, rgba(5,3,11,.78) 100%),
      linear-gradient(180deg, rgba(5,3,11,.2), rgba(5,3,11,.48));}
    @keyframes float{0%,100%{transform:translate(-50%,50%) translateY(0)}50%{transform:translate(-50%,50%) translateY(-10px)}}
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <img class="logo-glow" src="./SKYESOVERLONDONDIETYLOGO.png" alt="" aria-hidden="true" />
  <div class="veil"></div>
  <script>
    (function(){
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');
      let w=0,h=0,dpr=1,t=0;
      let stars=[], shards=[];
      function resize(){
        dpr = Math.min(window.devicePixelRatio||1, 2);
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w*dpr; canvas.height = h*dpr;
        canvas.style.width = w+'px'; canvas.style.height = h+'px';
        ctx.setTransform(dpr,0,0,dpr,0,0);
        stars = Array.from({length:Math.max(120, Math.floor(w/11))}, () => ({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.7+.2,a:Math.random()*.8+.08,s:Math.random()*.11+.02,p:Math.random()*Math.PI*2}));
        shards = Array.from({length:28}, () => ({x:(Math.random()-0.5)*w*1.4,y:(Math.random()-0.5)*h*1.2,z:Math.random()*1+.4,rx:Math.random()*Math.PI,ry:Math.random()*Math.PI,spin:(Math.random()-.5)*.01,float:Math.random()*Math.PI*2,col:Math.random()>0.5?'gold':'purple'}));
      }
      function drawNebula(){
        const clouds=[
          [w*.18,h*.16,w*.34,'141,88,255',.18],
          [w*.82,h*.2,w*.28,'49,231,255',.13],
          [w*.5,h*.9,w*.42,'255,211,106',.09],
          [w*.58,h*.42,w*.36,'141,88,255',.08]
        ];
        clouds.forEach(([x,y,rgbRad,c,a])=>{
          const grad = ctx.createRadialGradient(x,y,0,x,y,rgbRad);
          grad.addColorStop(0,`rgba(${c},${a})`);
          grad.addColorStop(.5,`rgba(${c},${a*.33})`);
          grad.addColorStop(1,`rgba(${c},0)`);
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(x,y,rgbRad,0,Math.PI*2); ctx.fill();
        });
      }
      function drawGrid(){
        ctx.save();
        ctx.translate(w/2,h*.62);
        for(let row=0; row<26; row++){
          const y = row*24 + ((t*24)%24);
          const scale = 1 + row*.1;
          const width = w*.08*scale + row*40;
          ctx.strokeStyle = `rgba(141,88,255,${.22-row*.006})`;
          ctx.beginPath();
          ctx.moveTo(-width, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }
        for(let col=-16; col<=16; col++){
          ctx.strokeStyle = col%4===0 ? 'rgba(255,211,106,.10)' : 'rgba(49,231,255,.08)';
          ctx.beginPath();
          ctx.moveTo(col*50, 0);
          ctx.lineTo(col*160, h);
          ctx.stroke();
        }
        ctx.restore();
      }
      function drawStars(){
        stars.forEach(s=>{
          s.y += s.s; if(s.y>h+2) s.y=-2;
          const alpha=s.a*(.55+.45*Math.sin(t*.7+s.p));
          ctx.fillStyle=`rgba(255,255,255,${alpha})`;
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
        });
      }
      function drawShards(){
        ctx.save(); ctx.translate(w/2,h/2);
        shards.forEach((s,i)=>{
          const driftX = Math.sin(t*.22 + i)*w*.16;
          const driftY = Math.cos(t*.18 + s.float)*h*.12;
          const x = s.x*.22 + driftX;
          const y = s.y*.18 + driftY;
          const size = 16*s.z + 10*Math.sin(t*.3+s.float);
          ctx.save();
          ctx.translate(x,y);
          ctx.rotate(s.rx + t*s.spin*26);
          ctx.strokeStyle = s.col==='gold' ? 'rgba(255,211,106,.32)' : 'rgba(141,88,255,.24)';
          ctx.fillStyle = s.col==='gold' ? 'rgba(255,211,106,.06)' : 'rgba(141,88,255,.05)';
          ctx.beginPath();
          ctx.moveTo(0,-size);
          ctx.lineTo(size*.64,0);
          ctx.lineTo(0,size);
          ctx.lineTo(-size*.64,0);
          ctx.closePath();
          ctx.fill(); ctx.stroke();
          ctx.restore();
        });
        ctx.restore();
      }
      function frame(){
        t += 0.016;
        ctx.clearRect(0,0,w,h);
        const bg = ctx.createLinearGradient(0,0,0,h);
        bg.addColorStop(0,'#04030a'); bg.addColorStop(1,'#080611');
        ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);
        drawNebula(); drawStars(); drawGrid(); drawShards();
        requestAnimationFrame(frame);
      }
      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
